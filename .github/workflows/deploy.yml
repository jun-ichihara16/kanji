name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build React app
      - name: Install & Build React App
        working-directory: app
        run: |
          npm ci
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_LINE_CHANNEL_ID: ${{ secrets.VITE_LINE_CHANNEL_ID }}

      # Combine: LP (root) + React app (app/)
      - name: Prepare deploy directory
        run: |
          mkdir -p _site/app
          # Copy LP files
          cp CNAME _site/
          cp robots.txt _site/
          cp sitemap.xml _site/
          cp index.html _site/
          cp app.html _site/
          cp privacy.html _site/
          cp terms.html _site/
          cp contact.html _site/
          cp -r 05_img _site/
          cp -r 04_brand _site/
          # Copy React build
          cp -r app/dist/* _site/app/
          # SPA fallback: copy index.html to all routes
          cp _site/app/index.html _site/app/404.html
          mkdir -p _site/app/auth/callback
          cp _site/app/index.html _site/app/auth/callback/index.html
          mkdir -p _site/app/dashboard
          cp _site/app/index.html _site/app/dashboard/index.html
          mkdir -p _site/app/events/new
          cp _site/app/index.html _site/app/events/new/index.html
          mkdir -p _site/app/onboarding
          cp _site/app/index.html _site/app/onboarding/index.html
          mkdir -p _site/app/admin _site/app/admin/users _site/app/admin/events _site/app/admin/venues _site/app/admin/inquiries
          for d in _site/app/admin _site/app/admin/users _site/app/admin/events _site/app/admin/venues _site/app/admin/inquiries; do cp _site/app/index.html $d/index.html; done
          mkdir -p _site/app/e
          cp _site/app/index.html _site/app/e/index.html
          cp _site/app/404.html _site/404.html

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4
        id: deployment
